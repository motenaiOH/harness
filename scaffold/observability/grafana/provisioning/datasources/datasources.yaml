apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus # fixed uid — dashboards reference datasource by this uid
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Tempo
    type: tempo
    uid: tempo # fixed uid — dashboards reference datasource by this uid
    access: proxy
    url: http://tempo:3200
  - name: Loki
    type: loki
    uid: loki # fixed uid — dashboards reference datasource by this uid
    access: proxy
    url: http://loki:3100
